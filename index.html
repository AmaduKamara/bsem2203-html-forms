<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Forms</title>
  </head>
  <body>
    <h1>HTML Forms</h1>

    <h1>Link Tag</h1>
    <a href="https://amazon.com">Amazon E-Commerce</a>
    <a href="https://amazon.com">Alibaba</a>
    <a href="https://amazon.com">E-Bay</a>
    <a href="https://amazon.com">Apple</a>
    <a href="https://amazon.com">Lenovo</a>

    <div>
      <p>Learning about <b>Git</b> and <i>GitHub</i></p>
      <p>
        Lorem, ipsum dolor sit amet
        <span style="color: red">consectetur</span> adipisicing elit.
        Voluptatum, dolores.
      </p>
    </div>

    <h2>HTML Image Tag (img)</h2>
    <img src="./images/Amkam.png" alt="Amkam's Photo" width="500px" />

    <h2>HTML Student Registration Form</h2>
    <form action="">
      <div>
        <label for="">First Name</label>
        <input type="text" placeholder="Enter first name" required />
      </div>

      <div>
        <label for="">Last Name</label>
        <input type="text" placeholder="Enter last name" required />
      </div>

      <div>
        <label for="">Email</label>
        <input type="email" placeholder="youremail@email.com" required />
      </div>

      <div>
        <label for="">Date of Birth</label>
        <input type="date" required />
      </div>

      <div>
        <label for="">Age</label>
        <input type="number" placeholder="0" required />
      </div>

      <div>
        <label for="">Address</label>
        <input required type="text" placeholder="Enter you permanent address" />
      </div>

      <button type="submit">Submit Data</button>
    </form>
  </body>
</html>
